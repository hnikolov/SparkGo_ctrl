<!DOCTYPE html>
<html>
<head>
    <title>BLE Guitar Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; padding: 12px; margin: 0; }
        h1 { font-size: 1.4em; margin: 8px 0; }
        button {
            display: block; width: 100%; padding: 14px; font-size: 18px;
            cursor: pointer; margin: 8px 0; border: 1px solid #999; border-radius: 8px;
            background: #f5f5f5; -webkit-tap-highlight-color: transparent;
        }
        button:active { background: #ddd; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        #controls { display: flex; gap: 8px; }
        #controls button { flex: 1; }
        #status { color: #666; margin: 10px 0; font-size: 14px; }
        #presets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        #presets button { margin: 0; }
        h3 { font-size: 1em; margin: 10px 0 4px; }
        #log {
            text-align: left; background: #eee; padding: 8px; border-radius: 6px;
            height: 35vh; overflow-y: auto; font-family: monospace; font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>BLE Guitar Controller</h1>
    <div id="controls">
        <button id="connectBtn">Connect</button>
        <button id="runSeqBtn" disabled>Run Sequence</button>
    </div>
    <div id="status">Status: Disconnected</div>
    <div id="presets">
        <button class="presetBtn" data-preset="0" disabled>Preset 1</button>
        <button class="presetBtn" data-preset="1" disabled>Preset 2</button>
        <button class="presetBtn" data-preset="2" disabled>Preset 3</button>
        <button class="presetBtn" data-preset="3" disabled>Preset 4</button>
    </div>
    <h3>Log</h3>
    <div id="log"></div>

    <script>
        // Spark Go BLE Service and Characteristics
        const SPARK_SERVICE_UUID = "0000ffc0-0000-1000-8000-00805f9b34fb";
        const SPARK_WRITE_UUID   = "0000ffc1-0000-1000-8000-00805f9b34fb";
        const SPARK_NOTIFY_UUID  = "0000ffc2-0000-1000-8000-00805f9b34fb";

        // Generic device BLE Service and Characteristics
        const GENERIC_SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const GENERIC_CHAR_UUID    = "0000ffe1-0000-1000-8000-00805f9b34fb";

        let device, server, writeChar, notifyChar;
        let connected = false;
        let deviceType = null; // 'spark' or 'generic'

        function setControlsEnabled(enabled) {
            document.getElementById('runSeqBtn').disabled = !enabled;
            document.querySelectorAll('.presetBtn').forEach(b => b.disabled = !enabled);
        }

        const log = (msg) => {
            const div = document.getElementById('log');
            div.innerHTML += `> ${msg}<br>`;
            div.scrollTop = div.scrollHeight;
        };

        const hexToBytes = (hex) => {
            let bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
            }
            return bytes;
        };

        async function connect() {
            try {
                log("Scanning for BLE devices...");
                device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SPARK_SERVICE_UUID, GENERIC_SERVICE_UUID]
                });

                log(`Connecting to ${device.name || 'Unknown'}...`);
                server = await device.gatt.connect();

                if (device.name && device.name.startsWith('Spark')) {
                    deviceType = 'spark';
                    log('Detected Spark device');
                    const service = await server.getPrimaryService(SPARK_SERVICE_UUID);
                    writeChar = await service.getCharacteristic(SPARK_WRITE_UUID);
                    notifyChar = await service.getCharacteristic(SPARK_NOTIFY_UUID);
                } else {
                    deviceType = 'generic';
                    log('Detected generic BLE device');
                    const service = await server.getPrimaryService(GENERIC_SERVICE_UUID);
                    writeChar = await service.getCharacteristic(GENERIC_CHAR_UUID);
                    notifyChar = writeChar;
                }

                // Setup Notifications
                try {
                    await notifyChar.startNotifications();
                    notifyChar.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        let hex = Array.from(new Uint8Array(value.buffer))
                                       .map(b => b.toString(16).padStart(2, '0')).join('');
                        log(`Received: ${hex}`);
                    });
                } catch (e) {
                    log('Notifications not supported on this device');
                }

                connected = true;
                document.getElementById('connectBtn').innerText = 'Disconnect';
                document.getElementById('status').innerText = `Status: Connected to ${device.name || 'Unknown'} (${deviceType})`;
                setControlsEnabled(true);

            } catch (error) {
                log("Error: " + error);
            }
        }

        function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            connected = false;
            deviceType = null;
            writeChar = null;
            notifyChar = null;
            document.getElementById('connectBtn').innerText = 'Connect';
            document.getElementById('status').innerText = 'Status: Disconnected';
            setControlsEnabled(false);
            log('Disconnected.');
        }

        async function selectPreset(index) {
            log(`Setting Preset ${index}`);
            let setCmd;
            if (deviceType === 'spark') {
                setCmd = hexToBytes(`01fe000053fe1a000000000000000000f0013a15013800000${index}f7`);
            } else {
                setCmd = hexToBytes(`7e000000010${index}`);
            }
            await writeChar.writeValue(setCmd);
        }

        async function runSequence() {
            for (let x = 0; x < 4; x++) {
                log(`Setting Preset ${x}`);
                let setCmd;
                if (deviceType === 'spark') {
                    setCmd = hexToBytes(`01fe000053fe1a000000000000000000f0013a15013800000${x}f7`);
                } else {
                    setCmd = hexToBytes(`7e000000010${x}`);
                }
                await writeChar.writeValue(setCmd);
                
                await new Promise(r => setTimeout(r, 2000));

                if (deviceType === 'spark') {
                    log(`Getting Preset ${x}`);
                    const getCmd = hexToBytes(`01fe000053fe1b000000000000000000f0013a1502010000000${x}f7`);
                    await writeChar.writeValue(getCmd);
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        document.getElementById('connectBtn').addEventListener('click', () => {
            connected ? disconnect() : connect();
        });

        document.getElementById('runSeqBtn').addEventListener('click', runSequence);

        document.querySelectorAll('.presetBtn').forEach(btn => {
            btn.addEventListener('click', () => selectPreset(parseInt(btn.dataset.preset)));
        });
    </script>
</body>
</html>
